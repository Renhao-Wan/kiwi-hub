server {
    listen 443 ssl;
    server_name wanrenhao.me;

    # sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/ssl/private/selfsigned.key -out /etc/ssl/certs/selfsigned.crt -subj "/CN=wanrenhao.me"
    ssl_certificate /etc/ssl/certs/selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/selfsigned.key;

    # =========================================================
    # 0. OPTIONS 预检请求统一处理（匹配所有路径）
    # =========================================================
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        include /etc/nginx/conf.d/cors_headers.conf;                    # 写的是容器内目录，不是挂载目录
    }

    # =========================================================
    # 2. 全局 Swagger 静态资源
    # =========================================================
    location ~ ^/(webjars|v3|swagger-resources) {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        if ($http_referer ~* "/users/") {
            proxy_pass http://kiwi-user:8070;
        }
        if ($http_referer ~* "/links/") {
            proxy_pass http://kiwi-link:8030;
        }
        proxy_pass http://kiwi-content:8010;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    # =========================================================
    # 3. Kiwi-User (用户服务)
    # =========================================================
    location /api/users/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-user:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    location /users/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/users/(.*)$ /$1 break;
        proxy_pass http://kiwi-user:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    # =========================================================
    # 4. Kiwi-Link (短链服务)
    # =========================================================
    location /api/links/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-link:8030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    location /links/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/links/(.*)$ /$1 break;
        proxy_pass http://kiwi-link:8030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    # =========================================================
    # 5. Kiwi-Content (内容服务)
    # =========================================================
    location /api/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    # 文档API
    location /content/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/content/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    # 后端接口
    location /interactions/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/content/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    location /search/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/content/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    location /articles/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/content/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }

    location /comments/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 204;
        }
        rewrite ^/content/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /etc/nginx/conf.d/cors_headers.conf;
    }
}
