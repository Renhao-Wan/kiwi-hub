server {
    listen 443 ssl;
    server_name wanrenhao.me;

    ssl_certificate /etc/ssl/certs/selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/selfsigned.key;

    set $cors_origin "192.168.1.102:5173";

    # 全局添加 CORS 响应头
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range, Token, Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "86400" always; # 预检请求缓存 1 天，减少 OPTIONS 请求

    # 3. 统一处理 OPTIONS 预检请求，直接返回 204
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ==========================
    # 后端接口代理
    # ==========================
    location /articles/ {
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /search/ {
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /comments/ {
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /interactions/ {
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 用户服务
    location /users/ {
        proxy_pass http://kiwi-user:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 短链服务
    location /links/ {
        proxy_pass http://kiwi-link:8030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API 统一入口
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        if ($http_referer ~* "/users/") {
            proxy_pass http://kiwi-user:8070;
        }
        if ($http_referer ~* "/links/") {
            proxy_pass http://kiwi-link:8030;
        }
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ============== kiwi-user 服务的 Swagger ==============
    # 统一处理所有 /knife/users/ 路径（doc.html + v3 + webjars + swagger-resources 等）
    location ~ ^/knife/users/ {
        rewrite ^/knife/users/(.*)$ /$1 break;
        proxy_pass http://kiwi-user:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ============== kiwi-link 服务的 Swagger ==============
    # 统一处理所有 /knife/links/ 路径（doc.html + v3 + webjars + swagger-resources 等）
    location ~ ^/knife/links/ {
        rewrite ^/knife/links/(.*)$ /$1 break;
        proxy_pass http://kiwi-link:8030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ============== kiwi-content 服务的 Swagger ==============
    # 统一处理所有 /knife/content/ 路径（doc.html + v3 + webjars + swagger-resources 等）
    location ~ ^/knife/content/ {
        rewrite ^/knife/content/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================
    # 前端静态资源
    # ==========================
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}