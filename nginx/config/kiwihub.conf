server {
    listen 80;
    server_name kiwihub.com www.kiwihub.com 47.109.26.32 localhost;
    include /opt/kiwihub/nginx/config/*.conf;

    # =========================================================
    # 0. OPTIONS 预检请求统一处理
    # =========================================================
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Token' always;
        add_header Access-Control-Allow-Credentials 'true' always;
        add_header Content-Type                     'text/plain; charset=utf-8';
        return 204;
    }

    # =========================================================
    # 1. 前端首页 (优先级最低，作为兜底)
    # =========================================================
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/index.html;
        include /opt/kiwihub/nginx/config/cors_headers.conf;
    }

    # =========================================================
    # 2. 全局 Swagger 静态资源清洗 (CSS, JS, JSON)
    # =========================================================
    location ~ ^/(webjars|v3|swagger-resources) {
        if ($http_referer ~* "/users/") {
            proxy_pass http://kiwi-user:8070;
        }
        if ($http_referer ~* "/links/") {
            proxy_pass http://kiwi-link:8030;
        }
        proxy_pass http://kiwi-content:8010;
        include /opt/kiwihub/nginx/config/cors_headers.conf;
    }

    # =========================================================
    # 3. Kiwi-User (用户服务)
    # =========================================================
    location /api/users/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-user:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /opt/kiwihub/nginx/config/cors_headers.conf;
    }

    location /users/ {
        rewrite ^/users/(.*)$ /$1 break;
        proxy_pass http://kiwi-user:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /opt/kiwihub/nginx/config/cors_headers.conf;
    }

    # =========================================================
    # 4. Kiwi-Link (短链服务)
    # =========================================================
    location /api/links/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-link:8030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /opt/kiwihub/nginx/config/cors_headers.conf;
    }

    location /links/ {
        rewrite ^/links/(.*)$ /$1 break;
        proxy_pass http://kiwi-link:8030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /opt/kiwihub/nginx/config/cors_headers.conf;
    }

    # =========================================================
    # 5. Kiwi-Content (内容服务)
    # =========================================================
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /opt/kiwihub/nginx/config/cors_headers.conf;
    }

    location /content/ {
        rewrite ^/content/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
        include /opt/kiwihub/nginx/config/cors_headers.conf;
    }
}
