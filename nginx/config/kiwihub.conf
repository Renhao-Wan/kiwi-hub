# 动态返回浏览器实际发送的 Origin
map $http_origin $cors_origin {
    default "";
    # 开发环境
    "~^http://192\.168\.1\.102:5173$"   "$http_origin";
    "~^https://192\.168\.1\.102:5173$"  "$http_origin";
    # 生产环境（允许子域名）
    "~^https?://(.*?\.)?wanrenhao\.me(:[0-9]+)?$" "$http_origin";
    # vercel部署配置
    "~^https://kiwi-hub-vue\.vercel\.app$" "$http_origin";
}

# 消除 if is evil：动态映射后端路由
map $http_referer $api_backend {
    default             "http://kiwi-content:8010";
    "~*/users/"         "http://kiwi-user:8070";
    "~*/links/"         "http://kiwi-link:8030";
}

server {
    listen 443 ssl;
    server_name wanrenhao.me;

    ssl_certificate /etc/ssl/certs/selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/selfsigned.key;

    # ==========================
    # 通用代理头配置
    # ==========================
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ==========================
    # 全局 CORS 响应头
    # （这里的配置会自动被下方所有的 location 和 if 继承）
    # ==========================
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range, Token, Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "86400" always;

    # 统一处理 OPTIONS 预检请求
    if ($request_method = OPTIONS) {
        # 注意：这里千万不要写 add_header，它会自动继承外层的 add_header
        # 且 Nginx 对 204 状态码会自动省去 Content-Length，无需画蛇添足
        return 204;
    }

    # ==========================
    # 后端接口代理
    # ==========================
    location ~ ^/(articles|search|comments|interactions)/ {
        proxy_pass http://kiwi-content:8010;
    }

    location /users/ {
        proxy_pass http://kiwi-user:8070;
    }

    location /links/ {
        proxy_pass http://kiwi-link:8030;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_backend;
    }

    # ==========================
    # Swagger / Knife4j 路由聚合
    # ==========================
    location /knife/users/ {
        rewrite ^/knife/users/(.*)$ /$1 break;
        proxy_set_header X-Forwarded-Prefix /knife/users;
        proxy_pass http://kiwi-user:8070;
    }

    location /knife/links/ {
        rewrite ^/knife/links/(.*)$ /$1 break;
        proxy_set_header X-Forwarded-Prefix /knife/links;
        proxy_pass http://kiwi-link:8030;
    }

    location /knife/content/ {
        rewrite ^/knife/content/(.*)$ /$1 break;
        proxy_set_header X-Forwarded-Prefix /knife/content;
        proxy_pass http://kiwi-content:8010;
    }

    # ==========================
    # 前端静态资源
    # ==========================
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}