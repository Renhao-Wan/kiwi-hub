server {
    listen 80;
    server_name kiwihub.com www.kiwihub.com 120.27.158.5 localhost;
    include /opt/kiwihub/nginx/config/*.conf;

    # =========================================================
    # 1. 前端首页 (优先级最低，作为兜底)
    # =========================================================
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # =========================================================
    # 2. 全局 Swagger 静态资源清洗 (CSS, JS, JSON)
    # 关键：根据 Referer 决定去哪个服务，并去掉 url 中的服务前缀
    # =========================================================
    location ~ ^/(webjars|v3|swagger-resources) {
        # 1. 来源是用户服务文档 (/users/doc.html)
        if ($http_referer ~* "/users/") {
            proxy_pass http://kiwi-user:8070;
        }
        # 2. 来源是短链服务文档 (/links/doc.html)
        if ($http_referer ~* "/links/") {
            proxy_pass http://kiwi-link:8030;
        }
        # 3. 来源是内容服务文档 (/content/doc.html) 或其他
        # 默认去内容服务
        proxy_pass http://kiwi-content:8010;
    }

    # =========================================================
    # 3. Kiwi-User (用户服务)
    # 后端路径特征: /users/login (自带 /users)
    # =========================================================

    # (A) API 接口 - 供前端和 Swagger 调试使用
    # 请求: /api/users/login -> Nginx去掉/api -> 后端: /users/login
    location /api/users/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-user:8070;
        proxy_set_header Host $host;
        # 告诉 Knife4j: 文档里所有接口都要加上 /api 前缀
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # (B) 文档页面访问入口
    # 请求: http://IP/users/doc.html -> Nginx去掉/users -> 后端: /doc.html
    location /users/ {
        rewrite ^/users/(.*)$ /$1 break;
        proxy_pass http://kiwi-user:8070;
        proxy_set_header Host $host;
        # 关键点：告诉 Knife4j 基础路径是 /api，这样它显示的接口就是 /api/users/login
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # =========================================================
    # 4. Kiwi-Link (短链服务)
    # 后端路径特征: /links/generate (自带 /links)
    # =========================================================

    location /api/links/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-link:8030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    location /links/ {
        rewrite ^/links/(.*)$ /$1 break;
        proxy_pass http://kiwi-link:8030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # =========================================================
    # 5. Kiwi-Content (内容服务)
    # 后端路径特征: /articles, /comments (无统一前缀)
    # 必须放在最后，或者使用特定正则，防止抢占上面的规则
    # =========================================================

    # (A) API 接口
    # 匹配 /api/articles, /api/comments, /api/search 等
    # 这里偷懒匹配 /api/，因为上面的 /api/users 和 /api/links 优先级更高(最长前缀匹配)
    # 如果担心冲突，可以使用 location ~ ^/api/(articles|comments|search|interactions)/
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        # 告诉 Knife4j: 加上 /api 前缀
        # 结果: Prefix(/api) + Path(/articles) = /api/articles
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # (B) 文档页面访问入口
    # 请求: http://IP/content/doc.html
    location /content/ {
        rewrite ^/content/(.*)$ /$1 break;
        proxy_pass http://kiwi-content:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /api;
    }
}