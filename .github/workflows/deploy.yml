name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" , "feat/mysql-nginx-replace"]
    paths-ignore: [ "*.md", "docs/**", "test-reports/**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 这就是自动化测试！它会自动运行单元测试
      - name: 运行自动化单元测试 (CI)
        run: mvn clean install -DskipTests && mvn test

      # 如果测试没通过，流程会在这里直接阻断，不会部署错误代码！

      - name: 编译并打包 (跳过测试，因为上面已经测过了)
        run: mvn clean package -DskipTests

      # ---- 下面是自动化部署 (CD) ----

      # ===== 把 jar 和 Dockerfile 整理到统一目录 =====
      - name: 准备部署文件（在 github 的 Runner 临时目录）
        run: |
          mkdir -p deploy/services/link
          mkdir -p deploy/services/content
          mkdir -p deploy/services/user
          cp kiwi-service/kiwi-link/target/*.jar deploy/services/link/
          cp kiwi-service/kiwi-link/docker/Dockerfile deploy/services/link/
          cp kiwi-service/kiwi-content/target/*.jar deploy/services/content/
          cp kiwi-service/kiwi-content/docker/Dockerfile deploy/services/content/
          cp kiwi-service/kiwi-user/target/*.jar deploy/services/user/
          cp kiwi-service/kiwi-user/docker/Dockerfile deploy/services/user/
          cp docker-compose.yml deploy/

      # 开始部署
      - name: 部署到云服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}     # 云服务器IP (在 GitHub Secrets 里配置)
          username: ${{ secrets.SERVER_USER }} # 服务器账号
          password: ${{ secrets.SERVER_PWD }}  # 服务器密码
          source: "deploy/**"             # 上传整个 deploy 目录下的内容
          target: ${{ vars.DEPLOY_PATH }} # 服务器上的目标目录
          strip_components: 1             # 去掉 deploy/ 前缀，让内容直接落到 DEPLOY_PATH 下

      - name: SSH 登录并重启 Docker 容器
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PWD }}
          script: |                   # 如果只重启 link 服务（docker-compose up -d --build --no-deps kiwi-link）
            cd ${{ vars.DEPLOY_PATH }}
            docker-compose up -d --build